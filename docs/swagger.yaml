definitions:
  ancestry.Ancestry:
    properties:
      capacity:
        $ref: '#/definitions/ancestry.Capacity'
      description:
        type: string
      name:
        type: string
      size:
        type: string
      type:
        type: string
    required:
    - capacity
    - description
    - name
    - size
    - type
    type: object
  ancestry.Capacity:
    properties:
      effects:
        items:
          type: string
        type: array
      name:
        type: string
    required:
    - effects
    - name
    type: object
  background.Background:
    properties:
      abilities:
        items:
          type: string
        type: array
      name:
        type: string
      requirements:
        type: string
    required:
    - abilities
    - name
    - requirements
    type: object
  class.Class:
    properties:
      armor:
        items:
          type: string
        type: array
      hit_die:
        type: string
      key_stats:
        items:
          type: string
        type: array
      name:
        type: string
      saves:
        items:
          type: string
        type: array
      starting_gear:
        items:
          type: string
        type: array
      starting_hp:
        type: integer
      weapons:
        items:
          type: string
        type: array
    required:
    - armor
    - hit_die
    - key_stats
    - name
    - saves
    - starting_gear
    - starting_hp
    - weapons
    type: object
  handler.AncestriesList:
    properties:
      ancestries:
        items:
          $ref: '#/definitions/ancestry.Ancestry'
        type: array
    required:
    - ancestries
    type: object
  handler.BackgroundsList:
    properties:
      backgrounds:
        items:
          $ref: '#/definitions/background.Background'
        type: array
    required:
    - backgrounds
    type: object
  handler.ClassesList:
    properties:
      classes:
        items:
          $ref: '#/definitions/class.Class'
        type: array
    required:
    - classes
    type: object
  handler.HeroResponse:
    properties:
      hero:
        $ref: '#/definitions/hero.Hero'
      id:
        type: string
      sentence:
        type: string
    required:
    - hero
    - id
    - sentence
    type: object
  hero.Hero:
    properties:
      ancestry:
        $ref: '#/definitions/ancestry.Ancestry'
      background:
        $ref: '#/definitions/background.Background'
      class:
        $ref: '#/definitions/class.Class'
      id:
        type: string
      motivation:
        type: string
      origin:
        type: string
      quirks:
        items:
          type: string
        type: array
    required:
    - ancestry
    - background
    - class
    - id
    - motivation
    - origin
    - quirks
    type: object
info:
  contact: {}
paths:
  /ancestries:
    get:
      description: Get all ancestries.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.AncestriesList'
      summary: All ancestries.
      tags:
      - ancestry
  /ancestries/{name}:
    get:
      description: Get one ancestry by name.
      parameters:
      - description: Ancestry name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ancestry.Ancestry'
        "404":
          description: Not Found
      summary: Get ancestry.
      tags:
      - ancestry
  /backgrounds:
    get:
      description: List all available backgrounds.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.BackgroundsList'
      summary: All backgrounds.
      tags:
      - background
  /backgrounds/{name}:
    get:
      description: Get a background by name.
      parameters:
      - description: Background name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/background.Background'
        "404":
          description: Not Found
      summary: One Background.
      tags:
      - background
  /classes:
    get:
      description: Get all classes.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.ClassesList'
      summary: All classes.
      tags:
      - class
  /classes/{name}:
    get:
      description: Get one class by name.
      parameters:
      - description: Class name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/class.Class'
        "404":
          description: Not Found
      summary: Get class.
      tags:
      - class
  /heros:
    get:
      description: Generate a new hero character concept. If 'seed' query parameter
        is provided, it returns a deterministic hero for that seed.
      parameters:
      - description: Optional seed for deterministic generation
        in: query
        name: seed
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.HeroResponse'
      summary: Generate a new hero.
      tags:
      - hero
  /heros/{id}:
    get:
      description: Retrieve a hero by its UUID from the database.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.HeroResponse'
      summary: Get a specific hero from it's id.
      tags:
      - hero
swagger: "2.0"
