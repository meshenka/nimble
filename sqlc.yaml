version: "2"
sql:
  - schema: "internal/store/schema.sql"
    queries: "internal/store/query.sql"
    engine: "sqlite"
    gen:
      go:
        package: "store"
        out: "internal/store"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
